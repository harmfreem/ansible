- name: BGInfo Deploy
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure Directory
      win_file:
        path: C:\Sysinternals
        state: directory

    - name: Download Config
      win_get_url:
        url: https://raw.githubusercontent.com/harmfreem/ansible/main/micros.bgi
        dest: C:\Sysinternals\micros.bgi
        force: yes

    - name: Apply BGInfo
      win_shell: |
        C:\Sysinternals\Bginfo64.exe C:\Sysinternals\micros.bgi /timer:0 /silent /nolicprompt /i /p
