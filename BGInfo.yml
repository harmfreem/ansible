- name: Оновлення BGInfo
  hosts: all
  gather_facts: false
  tasks:
    - name: Create directory
      win_file:
        path: C:\Sysinternals
        state: directory

    - name: Kill BGInfo
      win_shell: Get-Process Bginfo* -ErrorAction SilentlyContinue | Stop-Process -Force
      ignore_errors: yes

    - name: Download BGInfo ZIP
      win_get_url:
        url: https://download.sysinternals.com/files/BGInfo.zip
        dest: C:\Sysinternals\BGInfo.zip
        force: yes

    - name: Unzip BGInfo
      win_unzip:
        src: C:\Sysinternals\BGInfo.zip
        dest: C:\Sysinternals
        remote_src: yes

    - name: Update Config
      win_get_url:
        url: https://raw.githubusercontent.com/harmfreem/ansible/main/micros.bgi
        dest: C:\Sysinternals\micros.bgi
        force: yes

    - name: Patch BGI Syntax (Fix None)
      win_shell: |
        $path = "C:\Sysinternals\micros.bgi"
        $content = [System.IO.File]::ReadAllText($path)
        $new_query = "SELECT IPAddress FROM Win32_NetworkAdapterConfiguration WHERE IPEnabled = 'True' AND DefaultIPGateway IS NOT NULL"
        if ($content -like "*UserFields*") {
            $content -replace 'SELECT.*?FROM.*?Win32_NetworkAdapterConfiguration.*?(?=[\x00-\x1F\x7F-\xFF])', $new_query | Set-Content $path -NoNewline
        }
      ignore_errors: yes

    - name: Update Shortcut
      win_shortcut:
        src: C:\Sysinternals\Bginfo64.exe
        dest: C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup\Bginfo.lnk
        arguments: '"C:\Sysinternals\micros.bgi" /timer:0 /silent /nolicprompt'

    - name: Run BGInfo
      win_shell: 'Start-Process "C:\Sysinternals\Bginfo64.exe" -ArgumentList "`"C:\Sysinternals\micros.bgi`" /timer:0 /silent /nolicprompt"'
