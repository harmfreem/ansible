- name: Оновлення BGInfo та встановлення сірого фону
  hosts: all
  gather_facts: false
  tasks:
    - name: Kill BGInfo
      win_shell: |
        Stop-Process -Name "Bginfo*" -Force
      ignore_errors: yes

    - name: Set Background Color to Gray
      win_shell: |
        Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name Wallpaper -Value ""
        Set-ItemProperty -Path 'HKCU:\Control Panel\Colors' -Name Background -Value "128 128 128"
        $tempBmp = "$env:TEMP\BGInfo.bmp"
        if (Test-Path $tempBmp) { Remove-Item $tempBmp -Force }
        Add-Type -TypeDefinition @'
        using System.Runtime.InteropServices;
        public class Win32 {
            [DllImport("user32.dll", SetLastError = true, CharSet = CharSet.Auto)]
            public static extern bool SystemParametersInfo(uint uiAction, uint uiParam, string pvParam, uint fWinIni);
        }
'@
        [Win32]::SystemParametersInfo(0x0014, 0, "", 0x01 -bor 0x02)

    - name: Execute BGInfo
      win_shell: |
        C:\Sysinternals\Bginfo64.exe "C:\Sysinternals\micros.bgi" /timer:0 /silent /nolicprompt /i

    - name: Create Startup Shortcut
      win_shortcut:
        src: C:\Sysinternals\Bginfo64.exe
        dest: C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup\Bginfo.lnk
        arguments: |
          "C:\Sysinternals\micros.bgi" /timer:0 /silent /nolicprompt /i
