- name: Оновлення BGInfo та встановлення сірого фону
  hosts: all
  gather_facts: false
  tasks:
    - name: Kill BGInfo
      win_shell: |
        Get-Process Bginfo* -ErrorAction SilentlyContinue | Stop-Process -Force
      ignore_errors: yes

    - name: Set Gray Background Color
      win_regedit:
        path: HKCU:\Control Panel\Colors
        name: Background
        data: 128 128 128

    - name: Remove Wallpaper Path
      win_regedit:
        path: HKCU:\Control Panel\Desktop
        name: Wallpaper
        data: ""

    - name: Apply Desktop Settings
      win_shell: |
        $Definition = @"
        using System;
        using System.Runtime.InteropServices;
        public class Win32 {
            [DllImport("user32.dll")]
            public static extern bool SetSysColors(int nElements, int[] lpaElements, int[] lpaRgbValues);
            [DllImport("user32.dll", CharSet = CharSet.Auto)]
            public static extern int SystemParametersInfo(int uAction, int uParam, string pvParam, int fWinIni);
        }
        "@
        Add-Type -TypeDefinition $Definition -ErrorAction SilentlyContinue
        # Використовуємо десяткове значення для сірого (RGB 128,128,128 -> 0x808080 -> 8421504)
        [Win32]::SetSysColors(1, @(1), @(8421504))
        [Win32]::SystemParametersInfo(0x0014, 0, $null, 0x01)

    - name: Execute BGInfo
      win_shell: |
        C:\Sysinternals\Bginfo64.exe C:\Sysinternals\micros.bgi /timer:0 /silent /nolicprompt /i

    - name: Create Startup Shortcut
      win_shortcut:
        src: C:\Sysinternals\Bginfo64.exe
        dest: C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup\Bginfo.lnk
        arguments: C:\Sysinternals\micros.bgi /timer:0 /silent /nolicprompt /i
