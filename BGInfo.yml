- name: Оновлення BGInfo (Фінальна стабільна версія)
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure directory exists
      win_file:
        path: C:\Sysinternals
        state: directory

    - name: Terminate any existing BGInfo processes
      win_shell: |
        $procs = Get-Process Bginfo* -ErrorAction SilentlyContinue
        if ($procs) { $procs | Stop-Process -Force }
      ignore_errors: yes

    - name: Download BGInfo and Config
      win_get_url:
        url: "{{ item.url }}"
        dest: "{{ item.dest }}"
        force: yes
      loop:
        - { url: 'https://download.sysinternals.com/files/BGInfo.zip', dest: 'C:\Sysinternals\BGInfo.zip' }
        - { url: 'https://raw.githubusercontent.com/harmfreem/ansible/main/micros.bgi', dest: 'C:\Sysinternals\micros.bgi' }

    - name: Unzip, Unblock and Fix Attributes
      win_shell: |
        Expand-Archive -Path C:\Sysinternals\BGInfo.zip -DestinationPath C:\Sysinternals -Force
        Unblock-File -Path C:\Sysinternals\*.*
        Get-ChildItem -Path C:\Sysinternals -Recurse | ForEach-Object { 
          $_.Attributes = 'Normal' 
        }

    - name: Set Full Control for Everyone via SID
      win_acl:
        path: C:\Sysinternals
        user: 'S-1-1-0'
        rights: FullControl
        type: allow
        state: present

    - name: Execute BGInfo Now
      win_shell: |
        cmd.exe /c 'C:\Sysinternals\Bginfo64.exe "C:\Sysinternals\micros.bgi" /timer:0 /silent /nolicprompt /i'
      args:
        chdir: C:\Sysinternals

    - name: Create Startup Shortcut
      win_shortcut:
        src: C:\Sysinternals\Bginfo64.exe
        dest: C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup\Bginfo.lnk
        arguments: '"C:\Sysinternals\micros.bgi" /timer:0 /silent /nolicprompt /i'

    - name: Disable IPv6
      win_shell: |
        Get-NetAdapter | ForEach-Object {
          Set-NetAdapterBinding -Name $_.Name -ComponentID ms_tcpip6 -Enabled $false
        }
      ignore_errors: yes
