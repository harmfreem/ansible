- name: Update apps and preserve Zabbix config
  hosts: all
  gather_facts: no
  tasks:
    - name: Get list of service names
      ansible.windows.win_shell: (Get-Service).Name
      register: service_list
      changed_when: false

    - name: Stop Zabbix services
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop: ["Zabbix Agent", "Zabbix Agent 2"]
      when: item in service_list.stdout_lines
      register: zabbix_stop

    - name: Update Zabbix with config preservation
      ansible.windows.win_shell: |
        $zabbix = winget list --name "Zabbix Agent"
        if ($zabbix) {
            winget upgrade --name "Zabbix Agent" --override "REINSTALLMODE=amus" --accept-package-agreements --accept-source-agreements --silent
        }
      when: "'Zabbix Agent' in service_list.stdout"

    - name: Update all other packages
      ansible.windows.win_shell: |
        winget upgrade --all --accept-package-agreements --accept-source-agreements --silent
      register: winget_update
      failed_when: winget_update.rc != 0

    - name: Start Zabbix services
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: started
      loop: "{{ zabbix_stop.results }}"
      when: 
        - item.changed is defined 
        - item.changed
