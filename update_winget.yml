- name: Update apps with service management
  hosts: all
  gather_facts: no
  tasks:
    - name: Get list of service names
      ansible.windows.win_shell: (Get-Service).Name
      register: service_list
      changed_when: false

    - name: Stop Zabbix services
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop: ["Zabbix Agent", "Zabbix Agent 2"]
      when: item in service_list.stdout_lines
      register: zabbix_status

    - name: Update Zabbix with config preservation
      ansible.windows.win_shell: |
        $list = winget list --name "Zabbix Agent" --exact
        if ($LASTEXITCODE -eq 0) {
            winget upgrade --name "Zabbix Agent" --exact --override "REINSTALLMODE=amus" --accept-package-agreements --accept-source-agreements --silent
        }
      register: zabbix_update
      failed_when: false

    - name: Update all other packages
      ansible.windows.win_shell: |
        winget upgrade --all --accept-package-agreements --accept-source-agreements --silent
      register: winget_update
      failed_when: false

    - name: Start Zabbix services if they exist
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: started
      loop: "{{ zabbix_status.results }}"
      when: 
        - item.exists is defined
        - item.exists
