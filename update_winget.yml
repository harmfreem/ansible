- name: Update apps with service check
  hosts: all
  gather_facts: no
  tasks:
    - name: Get list of service names via PowerShell
      ansible.windows.win_shell: (Get-Service).Name
      register: service_list
      changed_when: false

    - name: Stop Zabbix services if they exist
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
      loop:
        - "Zabbix Agent"
        - "Zabbix Agent 2"
      when: item in service_list.stdout_lines
      register: zabbix_stop

    - name: Update all packages via Winget
      ansible.windows.win_shell: |
        winget upgrade --all --accept-package-agreements --accept-source-agreements --silent
      register: winget_update
      failed_when: winget_update.rc != 0

    - name: Start Zabbix services if they were stopped
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: started
      loop: "{{ zabbix_stop.results }}"
      when: 
        - item.changed is defined 
        - item.changed
